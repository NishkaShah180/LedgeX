# Application
spring.application.name=LedgeX
server.port=8080

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/ledgex_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=nishka
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=LedgeXSuperSecretKeyForJWTAuthentication2024MustBeAtLeast256BitsLong
app.jwt.expiration-ms=86400000

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Logging
logging.level.com.ledgex=DEBUG
logging.level.org.springframework.security=INFO

app.gemini.api-key=app.gemini.api-key=YOUR_GEMINI_API_KEY

